<style>

  :root{--ink:#0A0C10;--navy:#0E1B2E;--navy2:#16283F;--steel:#3E5069;--slate:#6B7688;
        --mist:#AEB6C2;--paper:#F4F5F7;--line:#1E2C3E;--line2:#E2E4E8;--royal:#1F4BC4;--chief:#5B8DEF;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px;}

  header.rr{background:linear-gradient(180deg,var(--ink) 0%,var(--navy) 100%);color:var(--paper);padding:34px 0 26px;}
  header.rr h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(28px,5vw,40px);letter-spacing:.02em;color:#fff;}
  header.rr .sub{font-size:15px;color:var(--mist);margin-top:6px;}

          display:flex;gap:22px;flex-wrap:wrap;text-transform:uppercase;}

  .panel{background:#EEF0F3;border-bottom:1px solid var(--line2);padding:22px 0;}
  .searchbar{display:flex;gap:9px;}
  .searchbar input{flex:1;min-width:0;padding:13px 14px;border:1.5px solid #D3D7DE;border-radius:5px;background:#fff;font:inherit;font-size:15px;}
  .searchbar input:focus{outline:none;border-color:var(--royal);box-shadow:0 0 0 3px rgba(31,75,196,.12);}
  .go{padding:13px 24px;border:none;border-radius:5px;background:var(--navy);color:#fff;font:inherit;font-size:14px;font-weight:600;cursor:pointer;}
  .go:hover{background:var(--royal);}
  .filter-row{margin-top:11px;}
  .filter-row{position:relative;}
  .locbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;max-width:360px;
          padding:11px 13px;border:1.5px solid #D3D7DE;border-radius:5px;background:#fff;font:inherit;
          font-size:14.5px;color:var(--navy2);cursor:pointer;text-align:left;}
  .locbtn:hover{border-color:var(--steel);}
  .locbtn .caret{color:var(--slate);font-size:11px;}
  .locpanel{position:absolute;z-index:20;top:calc(100% + 6px);left:0;width:100%;max-width:360px;background:#fff;
            border:1px solid #D3D7DE;border-radius:6px;box-shadow:0 8px 26px rgba(14,27,46,.14);padding:10px;}
  .locpanel input{width:100%;padding:9px 11px;border:1px solid #D3D7DE;border-radius:4px;font:inherit;font-size:14px;margin-bottom:8px;}
  .locpanel input:focus{outline:none;border-color:var(--royal);}
  #locopts{max-height:280px;overflow-y:auto;}
  .locgroup{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
            color:var(--slate);padding:10px 6px 6px;}
  .locopt{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:4px;cursor:pointer;font-size:14px;color:var(--navy2);}
  .locopt:hover{background:#F4F5F7;}
  .locopt input{width:16px;height:16px;margin:0;accent-color:var(--royal);flex:0 0 auto;}
  .locopt .n{margin-left:auto;color:var(--mist);font-size:12.5px;font-family:'IBM Plex Mono',monospace;}
  .lead-row{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14.5px;color:var(--navy2);cursor:pointer;}
  .lead-row input{width:18px;height:18px;accent-color:var(--royal);cursor:pointer;}
  .countline{margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;
             text-transform:uppercase;color:var(--slate);display:flex;gap:14px;align-items:center;}
  .clear{background:none;border:none;padding:0;font:inherit;color:var(--royal);cursor:pointer;text-transform:uppercase;}

  .list{padding:8px 0 50px;}
  .job{display:block;text-decoration:none;color:inherit;border-bottom:1px solid var(--line2);padding:17px 2px;transition:.12s;}
  .job:hover{background:#fff;padding-left:8px;padding-right:8px;}
  .job .t{font-family:'Fraunces',serif;font-size:17.5px;font-weight:500;color:var(--navy);line-height:1.3;}
  .job .m{margin-top:5px;font-size:13.5px;color:var(--slate);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .job .co{color:var(--royal);font-weight:500;}
  .dot{color:var(--mist);}
  .empty{padding:46px 8px;text-align:center;color:var(--slate);font-size:15px;}
  .empty .go{margin-top:14px;}
  .notice{background:#FFF6E5;border:1px solid #F0D9A8;border-radius:6px;padding:12px 14px;margin:16px 0 0;font-size:13.5px;color:#6B5320;}
  footer.rr{border-top:1px solid var(--line2);padding:24px 0 40px;font-size:13px;color:var(--slate);}
  footer.rr a{color:var(--royal);text-decoration:none;}
</style>

</div>

<div class="wrap">

</div>

const SENIORITY = /\b(chief|c[eoftm]o\b|coo\b|president|managing director|general manager|country manager|director|vp\b|vice president|head of|svp\b|evp\b)|(?<![,\-]\s)\b(?:md|gm)\b(?!\s*$)/i;

let JOBS = [], usingSample = false, updated = null;
let LOC_COUNTS = {};
let selectedLocs = (() => {
  try { return JSON.parse(localStorage.getItem("rr_locations") || "[]"); } catch(e){ return []; }
})();
function saveLocs(){
  try { localStorage.setItem("rr_locations", JSON.stringify(selectedLocs)); } catch(e){}
}

const ISO = {mt:"Malta",gb:"United Kingdom",uk:"United Kingdom",ie:"Ireland",im:"Isle of Man",gi:"Gibraltar",
cy:"Cyprus",gr:"Greece",bg:"Bulgaria",ro:"Romania",pl:"Poland",lv:"Latvia",lt:"Lithuania",ee:"Estonia",
ua:"Ukraine",am:"Armenia",ge:"Georgia",de:"Germany",es:"Spain",pt:"Portugal",it:"Italy",nl:"Netherlands",
be:"Belgium",fr:"France",se:"Sweden",dk:"Denmark",no:"Norway",fi:"Finland",cz:"Czechia",hu:"Hungary",
rs:"Serbia",hr:"Croatia",at:"Austria",ch:"Switzerland",us:"United States",ca:"Canada",br:"Brazil",
co:"Colombia",mx:"Mexico",ar:"Argentina",pe:"Peru",cl:"Chile",au:"Australia",nz:"New Zealand",in:"India",
ph:"Philippines",sg:"Singapore",jp:"Japan",za:"South Africa",ng:"Nigeria",ke:"Kenya",ae:"UAE",il:"Israel",
tr:"Turkey",my:"Malaysia",tw:"Taiwan",hk:"Hong Kong",al:"Albania",md:"Moldova",mk:"North Macedonia"};
const NAMES = Array.from(new Set(Object.values(ISO)));
const UK_CITIES = ["london","leeds","manchester","birmingham","glasgow","edinburgh","liverpool","sheffield","nottingham","bristol","brighton"];
const US_CITIES = ["new york","atlantic city","las vegas","southfield","chicago","boston","los angeles","san francisco","jersey city","philadelphia","denver","miami","austin","seattle","dallas","atlanta"];
// iGaming's actual hubs — pinned to the top so they aren't buried under volume
const HUBS = ["Multiple locations","Malta","United Kingdom","Gibraltar","Isle of Man","Cyprus","Ireland","UAE","Remote"];

function bucket(loc){
  if(!loc) return null;
  const s = String(loc).trim(), low = s.toLowerCase();
  if(/^\d+\s+locations?$/i.test(s) || low.includes("multiple location")) return "Multiple locations";
  if(low.includes("remote") || low.includes("anywhere")) return "Remote";
  if(low.includes("european union")) return "European Union";
  if(/\b(dubai|abu dhabi|sharjah)\b/.test(low)) return "UAE";
  for(const n of NAMES){
    if(new RegExp("\\b"+n.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b").test(low)) return n;
  }
  const parts = s.split(",").map(x=>x.trim());
  const tail = (parts[parts.length-1]||"").toLowerCase();
  if(ISO[tail]) return ISO[tail];
  if(tail.length===2 && /^[a-z]{2}$/.test(tail)) return tail.toUpperCase();
  const head = (parts[0]||"").toLowerCase();
  if(US_CITIES.some(c=>head.includes(c)) || ["usa","u.s.","united states"].includes(tail)) return "United States";
  if(UK_CITIES.some(c=>head.includes(c))) return "United Kingdom";
  return parts[parts.length-1] || null;
}

function ago(ts){
  if(!ts) return "";
  const d = Math.floor((Date.now()-ts)/86400000);
  if(d<=0) return "today"; if(d===1) return "1 day ago";
  if(d<30) return d+" days ago";
  const m=Math.floor(d/30); return m===1?"1 month ago":m+" months ago";
}

async function load(){
  for(const url of FEED_URLS){
    try{
      const r = await fetch(url, {cache:"no-store"});
      if(!r.ok) continue;
      const d = await r.json();
      JOBS = (d.jobs||[]).map(j=>({c:j.company,t:j.title,l:j.location,u:j.url,p:j.posted_at}));
      updated = d.generated_at ? Date.parse(d.generated_at) : null;
      usingSample = false;
      return;
    }catch(e){ /* next host */ }
  }
  JOBS = SAMPLE; usingSample = true;
}

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const leadOnly = document.getElementById("lead").checked;
  let out = JOBS;
  if(leadOnly) out = out.filter(j => SENIORITY.test(j.t||""));
  if(selectedLocs.length) out = out.filter(j => selectedLocs.includes(bucket(j.l)));
  if(q) out = out.filter(j => (j.t||"").toLowerCase().includes(q) || (j.c||"").toLowerCase().includes(q));
  out = out.slice().sort((a,b)=>(Date.parse(b.p||0)||0)-(Date.parse(a.p||0)||0));

  const anyFilter = q || leadOnly || selectedLocs.length;
  document.getElementById("count").textContent =
    anyFilter ? out.length.toLocaleString()+" of "+JOBS.length.toLocaleString()+" roles match"
              : JOBS.length.toLocaleString()+" roles";
  document.getElementById("clear").style.display = anyFilter ? "inline" : "none";

  const list = document.getElementById("list");
  if(!out.length){
    list.innerHTML = '<div class="empty">No roles match that search.</div>';
    return;
  }
  list.innerHTML = out.slice(0,400).map(j => `
    <a class="job" href="${j.u||"#"}" target="_blank" rel="noopener">
      <div class="t">${j.t||""}</div>
      <div class="m"><span class="co">${j.c||""}</span>
        ${j.l?'<span class="dot">&middot;</span><span>'+j.l+"</span>":""}
        ${j.p?'<span class="dot">&middot;</span><span>'+ago(Date.parse(j.p))+"</span>":""}
      </div>
    </a>`).join("");
}

function buildLocations(){
  LOC_COUNTS = {};
  JOBS.forEach(j => { const b = bucket(j.l); if(b) LOC_COUNTS[b] = (LOC_COUNTS[b]||0)+1; });
  // keep remembered picks even if this run has none of them
  selectedLocs = selectedLocs.filter(k => k in LOC_COUNTS || true);
  drawLocations();
  updateLocLabel();
}

function drawLocations(){
  const q = (document.getElementById("locsearch").value || "").toLowerCase();
  const hubs = HUBS.filter(h => LOC_COUNTS[h]);
  const rest = Object.keys(LOC_COUNTS).filter(k => !hubs.includes(k)).sort((a,b)=>LOC_COUNTS[b]-LOC_COUNTS[a]);
  const row = k => `<label class="locopt"><input type="checkbox" value="${k}"${selectedLocs.includes(k)?" checked":""} />
      <span>${k}</span><span class="n">${LOC_COUNTS[k]}</span></label>`;
  const f = arr => arr.filter(k => !q || k.toLowerCase().includes(q));
  const h2 = f(hubs), r2 = f(rest);
  document.getElementById("locopts").innerHTML =
      (h2.length ? '<div class="locgroup">iGaming hubs</div>'+h2.map(row).join("") : "")
    + (r2.length ? '<div class="locgroup">Everywhere else</div>'+r2.map(row).join("") : "")
    + (!h2.length && !r2.length ? '<div class="locgroup">No match</div>' : "");
  document.querySelectorAll("#locopts input").forEach(cb => {
    cb.addEventListener("change", () => {
      if(cb.checked){ if(!selectedLocs.includes(cb.value)) selectedLocs.push(cb.value); }
      else selectedLocs = selectedLocs.filter(v => v !== cb.value);
      saveLocs(); updateLocLabel(); render();
    });
  });
}

function updateLocLabel(){
  const el = document.getElementById("locbtn-label");
  if(!selectedLocs.length) el.textContent = "All locations";
  else if(selectedLocs.length <= 2) el.textContent = selectedLocs.join(", ");
  else el.textContent = selectedLocs.length + " locations selected";
}

function stats(){
  document.getElementById("t-roles").textContent = JOBS.length.toLocaleString()+" roles";
  document.getElementById("t-cos").textContent = new Set(JOBS.map(j=>j.c)).size+" companies";
  document.getElementById("t-upd").textContent = usingSample ? "sample data" : (updated?"updated "+ago(updated):"");
  if(usingSample){
    document.getElementById("notice").innerHTML =
      '<div class="notice"><b>Showing a small sample.</b> The live feed can\'t be reached from this preview &mdash; ' +
      'it will load normally once this page is hosted on your own domain.</div>';
  }
}

document.getElementById("btn").addEventListener("click", render);
document.getElementById("q").addEventListener("input", render);
document.getElementById("q").addEventListener("keydown", e => { if(e.key==="Enter") render(); });
document.getElementById("lead").addEventListener("change", render);
document.getElementById("locbtn").addEventListener("click", (e) => {
  e.stopPropagation();
  const p = document.getElementById("locpanel");
  const open = p.hasAttribute("hidden");
  if(open){ p.removeAttribute("hidden"); } else { p.setAttribute("hidden",""); }
  document.getElementById("locbtn").setAttribute("aria-expanded", open ? "true" : "false");
});
document.getElementById("locpanel").addEventListener("click", e => e.stopPropagation());
document.getElementById("locsearch").addEventListener("input", drawLocations);
document.addEventListener("click", () => {
  document.getElementById("locpanel").setAttribute("hidden","");
  document.getElementById("locbtn").setAttribute("aria-expanded","false");
});
document.getElementById("clear").addEventListener("click", () => {
  document.getElementById("q").value=""; document.getElementById("lead").checked=false;
  selectedLocs = []; saveLocs(); drawLocations(); updateLocLabel(); render();
});

load().then(()=>{ buildLocations(); stats(); render(); });
</script>
</body>
</html>
